<svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" fill="#1A1A2E" rx="40"/>

  <!-- Outer gradient circle -->
  <circle cx="90" cy="90" r="85" fill="none" stroke="url(#faviconGradient)" stroke-width="3" opacity="0.3"/>

  <!-- Main icon group -->
  <g transform="translate(45, 35)">
    <!-- Left wheel -->
    <circle cx="12" cy="52" r="9" fill="url(#faviconGradient)"/>
    <circle cx="12" cy="52" r="5" fill="#1A1A2E"/>
    
    <!-- Right wheel -->
    <circle cx="78" cy="52" r="9" fill="url(#faviconGradient)"/>
    <circle cx="78" cy="52" r="5" fill="#1A1A2E"/>
    
    <!-- Car body - modern sleek design -->
    <path d="M 15 40 Q 15 15 45 10 Q 75 15 75 40 L 75 45 L 15 45 Z" fill="url(#faviconGradient)" stroke="#764ba2" stroke-width="1"/>
    
    <!-- Car cabin -->
    <path d="M 25 10 Q 25 2 45 0 Q 65 2 65 10 Z" fill="#FF6B9D" stroke="#FF3D71" stroke-width="1"/>
    
    <!-- Windshield highlight -->
    <rect x="30" y="4" width="30" height="8" rx="2" fill="#ffffff" opacity="0.25"/>
    
    <!-- Side line accent -->
    <line x1="20" y1="28" x2="70" y2="28" stroke="#FF6B9D" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Accent dots for tech feel -->
  <circle cx="25" cy="30" r="2" fill="#00D68F" opacity="0.6"/>
  <circle cx="155" cy="150" r="2" fill="#00D68F" opacity="0.6"/>
  <circle cx="155" cy="30" r="1.5" fill="#FF6B9D" opacity="0.4"/>
</svg>
