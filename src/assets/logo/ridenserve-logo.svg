<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF3D71;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#primaryGradient)" opacity="0.1"/>

  <!-- Main car body - stylized modern design -->
  <g transform="translate(50, 60)">
    <!-- Left wheel -->
    <circle cx="15" cy="60" r="10" fill="url(#primaryGradient)"/>
    <circle cx="15" cy="60" r="6" fill="#1A1A2E"/>
    
    <!-- Right wheel -->
    <circle cx="85" cy="60" r="10" fill="url(#primaryGradient)"/>
    <circle cx="85" cy="60" r="6" fill="#1A1A2E"/>
    
    <!-- Car chassis base -->
    <path d="M 20 50 Q 20 20 50 15 Q 80 20 80 50 Z" fill="url(#primaryGradient)" stroke="#764ba2" stroke-width="1.5"/>
    
    <!-- Car top/cabin -->
    <path d="M 30 15 Q 30 5 50 0 Q 70 5 70 15 Z" fill="url(#accentGradient)" stroke="#FF3D71" stroke-width="1.5"/>
    
    <!-- Windows left -->
    <rect x="25" y="8" width="15" height="12" rx="2" fill="#ffffff" opacity="0.3"/>
    
    <!-- Windows right -->
    <rect x="60" y="8" width="15" height="12" rx="2" fill="#ffffff" opacity="0.3"/>
    
    <!-- Door accent -->
    <rect x="35" y="30" width="30" height="18" fill="none" stroke="url(#accentGradient)" stroke-width="1"/>
    
    <!-- Headlights -->
    <circle cx="16" cy="25" r="3" fill="#00D68F"/>
    <circle cx="84" cy="25" r="3" fill="#00D68F"/>
  </g>

  <!-- Text: RIDENSERVE -->
  <text x="100" y="150" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="url(#primaryGradient)">RIDENSERVE</text>
  
  <!-- Tagline -->
  <text x="100" y="170" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#764ba2" opacity="0.8">Your Ride, Your Choice</text>
</svg>
