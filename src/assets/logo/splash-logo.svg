<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="splashGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="carGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e7ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c7d2fe;stop-opacity:1" />
    </linearGradient>
    <filter id="carShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background gradient -->
  <rect width="400" height="600" fill="url(#splashGradient)"/>

  <!-- Decorative rounded border -->
  <rect x="20" y="20" width="360" height="560" rx="40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

  <!-- Car illustration -->
  <g transform="translate(200, 180)" filter="url(#carShadow)">
    <!-- Car body -->
    <ellipse cx="0" cy="45" rx="95" ry="50" fill="url(#carGradient)" stroke="#d1d5db" stroke-width="2"/>
    
    <!-- Car roof -->
    <path d="M -50 45 Q -60 10 0 -5 Q 60 10 50 45 Z" fill="url(#carGradient)" stroke="#d1d5db" stroke-width="2"/>
    
    <!-- Windshield -->
    <path d="M -40 25 Q -50 5 0 -10 Q 50 5 40 25 Z" fill="#e0f2fe" opacity="0.6" stroke="#b0c4de" stroke-width="1"/>
    
    <!-- Left wheel -->
    <g>
      <circle cx="-55" cy="80" r="22" fill="#1e1b4b" stroke="#6366f1" stroke-width="2"/>
      <circle cx="-55" cy="80" r="14" fill="none" stroke="#818cf8" stroke-width="2"/>
      <circle cx="-55" cy="80" r="6" fill="#6366f1"/>
    </g>
    
    <!-- Right wheel -->
    <g>
      <circle cx="55" cy="80" r="22" fill="#1e1b4b" stroke="#6366f1" stroke-width="2"/>
      <circle cx="55" cy="80" r="14" fill="none" stroke="#818cf8" stroke-width="2"/>
      <circle cx="55" cy="80" r="6" fill="#6366f1"/>
    </g>
    
    <!-- Door lines -->
    <line x1="-15" y1="20" x2="-15" y2="60" stroke="#b0c4de" stroke-width="1.5" opacity="0.5"/>
    <line x1="15" y1="20" x2="15" y2="60" stroke="#b0c4de" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Headlights -->
    <circle cx="-40" cy="20" r="5" fill="#fbbf24" opacity="0.8"/>
    <circle cx="40" cy="20" r="5" fill="#fbbf24" opacity="0.8"/>
    
    <!-- Lights/indicators -->
    <circle cx="-85" cy="50" r="4" fill="#f87171" opacity="0.7"/>
    <circle cx="85" cy="50" r="4" fill="#f87171" opacity="0.7"/>
  </g>

  <!-- Text section -->
  <g transform="translate(200, 400)">
    <!-- Main text "RIDE SERVE" -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="72" font-weight="bold" text-anchor="middle" fill="white" letter-spacing="8">
      RIDE
    </text>
    <text x="0" y="80" font-family="Arial, sans-serif" font-size="72" font-weight="bold" text-anchor="middle" fill="white" letter-spacing="8">
      SERVE
    </text>
    
    <!-- Center line divider -->
    <line x1="-80" y1="50" x2="80" y2="50" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    
    <!-- Tagline -->
    <text x="0" y="130" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" 
          fill="rgba(255,255,255,0.8)" letter-spacing="3">
      YOUR RIDE. OUR PROMISE.
    </text>
  </g>
</svg>
