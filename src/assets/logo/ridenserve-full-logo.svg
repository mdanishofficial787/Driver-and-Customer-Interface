<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF3D71;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="240" height="240" fill="#ffffff"/>

  <!-- Decorative elements -->
  <circle cx="220" cy="20" r="25" fill="url(#mainGradient)" opacity="0.1"/>
  <circle cx="20" cy="220" r="30" fill="url(#accentGradient)" opacity="0.1"/>

  <!-- Main logo group -->
  <g transform="translate(60, 50)" filter="url(#shadow)">
    <!-- Background circle -->
    <circle cx="60" cy="60" r="58" fill="url(#mainGradient)" opacity="0.15"/>
    
    <!-- Wheel assembly -->
    <!-- Left wheel -->
    <circle cx="18" cy="80" r="14" fill="url(#mainGradient)"/>
    <circle cx="18" cy="80" r="9" fill="#1A1A2E"/>
    <circle cx="18" cy="80" r="5" fill="url(#mainGradient)" opacity="0.5"/>
    
    <!-- Right wheel -->
    <circle cx="102" cy="80" r="14" fill="url(#mainGradient)"/>
    <circle cx="102" cy="80" r="9" fill="#1A1A2E"/>
    <circle cx="102" cy="80" r="5" fill="url(#mainGradient)" opacity="0.5"/>
    
    <!-- Car body base -->
    <path d="M 22 60 Q 22 25 60 18 Q 98 25 98 60 L 98 70 L 22 70 Z" 
          fill="url(#mainGradient)" stroke="#764ba2" stroke-width="2"/>
    
    <!-- Car cabin/top -->
    <path d="M 35 18 Q 35 5 60 0 Q 85 5 85 18 Z" 
          fill="url(#accentGradient)" stroke="#FF3D71" stroke-width="2"/>
    
    <!-- Glass windows -->
    <rect x="30" y="8" width="18" height="14" rx="2" fill="#ffffff" opacity="0.35"/>
    <rect x="72" y="8" width="18" height="14" rx="2" fill="#ffffff" opacity="0.35"/>
    
    <!-- Door accent line -->
    <g opacity="0.8">
      <rect x="40" y="35" width="40" height="25" rx="3" fill="none" 
            stroke="url(#accentGradient)" stroke-width="1.5"/>
    </g>
    
    <!-- Headlights (modern LED effect) -->
    <circle cx="20" cy="30" r="4" fill="#00D68F"/>
    <circle cx="20" cy="30" r="2" fill="#ffffff" opacity="0.6"/>
    <circle cx="100" cy="30" r="4" fill="#00D68F"/>
    <circle cx="100" cy="30" r="2" fill="#ffffff" opacity="0.6"/>
    
    <!-- Side accent stripe -->
    <line x1="25" y1="45" x2="95" y2="45" stroke="url(#accentGradient)" 
          stroke-width="2" opacity="0.7"/>
  </g>

  <!-- Logo text -->
  <text x="120" y="160" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
        fill="url(#mainGradient)" letter-spacing="1">RIDENSERVE</text>
  
  <!-- Tagline -->
  <text x="120" y="180" font-family="Arial, sans-serif" font-size="12" 
        fill="#764ba2" opacity="0.8" letter-spacing="2">YOUR RIDE • YOUR CHOICE</text>

  <!-- Decorative line under text -->
  <line x1="60" y1="195" x2="180" y2="195" stroke="url(#mainGradient)" stroke-width="2" opacity="0.5"/>
</svg>
