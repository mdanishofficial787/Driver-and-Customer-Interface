<ion-content class="form-content">
  <div class="hero-section">
    <div class="hero-toolbar">
      <ion-button fill="clear" class="hero-back-btn" routerLink="/customer/home">
        <ion-icon slot="icon-only" name="arrow-back"></ion-icon>
      </ion-button>
      <div class="hero-page-title">Schedule Ride</div>
    </div>
  </div>
  <div class="form-wrapper">
    <div class="request-card" *ngIf="!submitted">
      <div class="form-header">
        <h2>Plan Your Ride Details</h2>
        <p>Review and complete the booking information below</p>
      </div>

      <div class="form-group">
        <ion-item class="form-item">
          <ion-icon slot="start" name="calendar" class="form-icon white-icon"></ion-icon>
          <ion-label position="stacked" class="form-label">Select Date(s) & Time</ion-label>
          <ion-input [(ngModel)]="requiredDates" placeholder="May 20, 10:30 AM" class="form-input"></ion-input>
        </ion-item>
      </div>

      <div class="form-group">
        <ion-item class="form-item">
          <ion-icon slot="start" name="location" class="form-icon"></ion-icon>
          <ion-label position="stacked" class="form-label">Pickup Location</ion-label>
          <ion-input [(ngModel)]="pickupLocation" placeholder="Enter Pickup Location" class="form-input"></ion-input>
        </ion-item>
      </div>

      <div class="form-group">
        <ion-item class="form-item">
          <ion-icon slot="start" name="location" class="form-icon"></ion-icon>
          <ion-label position="stacked" class="form-label">Drop Location</ion-label>
          <ion-input [(ngModel)]="dropLocation" placeholder="Enter Drop Location" class="form-input"></ion-input>
        </ion-item>
      </div>

      <div class="vehicle-selection">
        <h3>Select Vehicle Type</h3>
        <div class="vehicle-options">
          <button class="vehicle-btn hatchback" [class.active]="selectedVehicle === 'hatchback'" (click)="selectVehicle('hatchback')">
            <ion-icon name="car"></ion-icon>
            <span>Hatchback</span>
          </button>
          <button class="vehicle-btn sedan" [class.active]="selectedVehicle === 'sedan'" (click)="selectVehicle('sedan')">
            <ion-icon name="car"></ion-icon>
            <span>Sedan</span>
          </button>
          <button class="vehicle-btn suv" [class.active]="selectedVehicle === 'suv'" (click)="selectVehicle('suv')">
            <ion-icon name="car"></ion-icon>
            <span>SUV</span>
          </button>
        </div>
      </div>

      <div class="actions">
        <ion-button expand="block" class="submit-btn" (click)="requestDriver()">Request Driver</ion-button>
      </div>
    </div>

    <div class="status-card" *ngIf="submitted">
      <div class="status-icon">
        <ion-icon name="checkmark-circle"></ion-icon>
      </div>
      <h2>Request Submitted</h2>
      <p class="status-message">Admin matching in progress</p>
      <p class="status-subtext">A driver will be assigned shortly</p>
    </div>
  </div>
</ion-content>
