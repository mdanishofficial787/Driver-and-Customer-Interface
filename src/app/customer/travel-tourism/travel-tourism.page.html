<ion-header>
  <ion-toolbar class="form-toolbar">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/customer/home" text="" icon="arrow-back" class="back-btn"></ion-back-button>
    </ion-buttons>
    <ion-title class="form-title">Travel & Tourism</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="form-content">
  <div class="form-wrapper">
    <div class="form-card" *ngIf="!submitted">
      <div class="form-header">
        <h2>Plan Your Adventure</h2>
        <p>Book a driver for your travel journey</p>
      </div>

      <div class="form-group">
        <ion-item class="form-item">
          <ion-label position="stacked" class="form-label">Customer CNIC *</ion-label>
          <ion-input [(ngModel)]="cnic" placeholder="e.g. 12345-1234567-1" class="form-input"></ion-input>
        </ion-item>
      </div>

      <div class="form-group">
        <ion-item class="form-item">
          <ion-label position="stacked" class="form-label">Destination</ion-label>
          <ion-input [(ngModel)]="destination" placeholder="Where are you going?" class="form-input"></ion-input>
        </ion-item>
      </div>

      <div class="form-group">
        <ion-item class="form-item">
          <ion-label position="stacked" class="form-label">Travel Dates</ion-label>
          <ion-datetime displayFormat="MMM DD, YYYY" [(ngModel)]="travelDates" class="form-input"></ion-datetime>
        </ion-item>
      </div>

      <div class="form-group">
        <ion-item class="form-item">
          <ion-label position="stacked" class="form-label">Pickup Location</ion-label>
          <ion-input [(ngModel)]="pickupLocation" placeholder="Starting point" class="form-input"></ion-input>
        </ion-item>
      </div>

      <div class="form-group">
        <ion-item class="form-item">
          <ion-label position="stacked" class="form-label">Return Location</ion-label>
          <ion-input [(ngModel)]="returnLocation" placeholder="Return point" class="form-input"></ion-input>
        </ion-item>
      </div>

      <div class="form-group">
        <ion-item class="form-item">
          <ion-label position="stacked" class="form-label">Duration (Days)</ion-label>
          <ion-input type="number" [(ngModel)]="durationDays" placeholder="Number of days" class="form-input"></ion-input>
        </ion-item>
      </div>

      <div class="actions">
        <ion-button expand="block" class="submit-btn" (click)="submitTravel()">Submit Request</ion-button>
      </div>
    </div>

    <div class="status-card" *ngIf="submitted">
      <div class="status-icon">
        <ion-icon name="checkmark-circle"></ion-icon>
      </div>
      <h2>Request Submitted</h2>
      <p class="status-message">Under Admin Review</p>
      <p class="status-subtext">Travel will be assigned shortly</p>
    </div>
  </div>
</ion-content>
