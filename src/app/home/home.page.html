<ion-header [translucent]="true">
  <ion-toolbar class="main-toolbar">
    <ion-title class="main-title">
      RideNServe
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="main-content">
  <ion-header collapse="condense">
    <ion-toolbar class="main-toolbar">
      <ion-title size="large" class="main-title">Welcome to RideNServe</ion-title>
    </ion-toolbar>
  </ion-header>

  <div id="container">
    <div class="welcome-section">
      <img src="assets/icon/favicon.svg" alt="RideServe" class="main-icon" style="width: 100px; height: 100px;">
      <h1>Your Ride, Your Way</h1>
      <p class="subtitle">Professional ride-sharing simplified</p>
    </div>
    
    <div class="features-section">
      <div class="feature-item">
        <ion-icon name="shield-checkmark-outline"></ion-icon>
        <h3>Safe & Secure</h3>
        <p>Verified drivers and secure payments</p>
      </div>
      <div class="feature-item">
        <ion-icon name="time-outline"></ion-icon>
        <h3>Anytime, Anywhere</h3>
        <p>Book rides on your schedule</p>
      </div>
      <div class="feature-item">
        <ion-icon name="person-circle-outline"></ion-icon>
        <h3>Professional</h3>
        <p>Experienced and rated drivers</p>
      </div>
    </div>
  </div>
</ion-content>
