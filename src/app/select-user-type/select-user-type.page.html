<ion-content class="select-content">
  <div class="select-container rs-slide-in">
    
    <!-- Header Section with Animated Background -->
    <div class="header-section">
      <div class="header-bg">
        <div class="wave wave-1"></div>
        <div class="wave wave-2"></div>
      </div>
      
      <div class="header-content">
        <img src="assets/logo/splash-logo.svg" alt="RideServe" class="splash-logo rs-float">
        <h1 style="color: white;">Welcome</h1>
        <p class="subtitle">Choose your account type to continue</p>
      </div>
    </div>

    <!-- Selection Cards -->
    <div class="cards-container">
      
      <!-- Customer Card -->
      <div class="selection-card customer-card" (click)="selectCustomer()">
        <div class="card-content">
          <div class="card-icon-wrapper">
            <ion-icon name="people-outline" class="card-icon"></ion-icon>
            <div class="icon-glow customer-glow"></div>
          </div>
          
          <div class="card-info">
            <h2>Customer</h2>
            <p>Book rides and enjoy our premium services</p>
            
            <div class="features-list">
              <div class="feature">
                <ion-icon name="checkmark-circle" class="feature-icon"></ion-icon>
                <span>Safe & Secure</span>
              </div>
              <div class="feature">
                <ion-icon name="checkmark-circle" class="feature-icon"></ion-icon>
                <span>Verified Drivers</span>
              </div>
              <div class="feature">
                <ion-icon name="checkmark-circle" class="feature-icon"></ion-icon>
                <span>24/7 Support</span>
              </div>
            </div>
          </div>
          
          <div class="card-arrow">
            <ion-icon name="arrow-forward-circle"></ion-icon>
          </div>
        </div>
        
        <div class="card-gradient customer-gradient"></div>
      </div>

      <!-- Driver Card -->
      <div class="selection-card driver-card" (click)="selectDriver()">
        <div class="card-content">
          <div class="card-icon-wrapper">
            <ion-icon name="person-outline" class="card-icon"></ion-icon>
            <div class="icon-glow driver-glow"></div>
          </div>
          
          <div class="card-info">
            <h2>Driver</h2>
            <p>Join as a driver and start earning today</p>
            
            <div class="features-list">
              <div class="feature">
                <ion-icon name="checkmark-circle" class="feature-icon"></ion-icon>
                <span>Flexible Schedule</span>
              </div>
              <div class="feature">
                <ion-icon name="checkmark-circle" class="feature-icon"></ion-icon>
                <span>High Earnings</span>
              </div>
              <div class="feature">
                <ion-icon name="checkmark-circle" class="feature-icon"></ion-icon>
                <span>Instant Payments</span>
              </div>
            </div>
          </div>
          
          <div class="card-arrow">
            <ion-icon name="arrow-forward-circle"></ion-icon>
          </div>
        </div>
        
        <div class="card-gradient driver-gradient"></div>
      </div>
    </div>

    <!-- Footer Info -->
    <div class="footer-info">
      <p>By continuing, you agree to our <a href="#">Terms</a> & <a href="#">Privacy Policy</a></p>
    </div>

  </div>
</ion-content>
