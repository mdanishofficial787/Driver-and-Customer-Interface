<ion-content class="splash-content">
  <div class="splash-container rs-fade-in">
    
    <!-- Animated Background -->
    <div class="splash-bg">
      <div class="circle circle-1"></div>
      <div class="circle circle-2"></div>
      <div class="circle circle-3"></div>
    </div>

    <!-- Logo Section -->
    <div class="logo-section rs-float">
      <div class="logo-wrapper">
        <img src="assets/logo/splash-logo.svg" alt="RideServe" class="splash-logo-img">
        <div class="logo-glow"></div>
      </div>
    </div>

    <!-- Loading Indicator -->
    <div class="loading-section">
      <div class="loading-bar">
        <div class="loading-progress"></div>
      </div>
      <p class="loading-text">Preparing your experience...</p>
    </div>

    <!-- Version Info -->
    <div class="version-info">
      <p>Version 1.0.0</p>
    </div>
    
  </div>
</ion-content>
